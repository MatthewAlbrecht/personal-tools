<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>RYM capture — backend</title>
		<style>
			body {
				font-family:
					system-ui,
					-apple-system,
					"Segoe UI",
					sans-serif;
				padding: 16px;
				max-width: 440px;
				margin: 0;
			}
			h2 {
				margin: 0 0 8px;
				font-size: 16px;
			}
			p.hint {
				margin: 0 0 16px;
				font-size: 13px;
				color: #555;
				line-height: 1.45;
			}
			label {
				display: block;
				margin-top: 12px;
				font-weight: 600;
				font-size: 12px;
			}
			input {
				width: 100%;
				margin-top: 4px;
				padding: 8px;
				box-sizing: border-box;
				font-size: 13px;
			}
			button {
				margin-top: 16px;
				padding: 8px 14px;
				font-size: 13px;
				cursor: pointer;
			}
			#status {
				margin-top: 12px;
				font-size: 13px;
				min-height: 1.2em;
			}
		</style>
	</head>
	<body>
		<h2>Backend sync (optional)</h2>
		<p class="hint">
			Set the same secret as <code>RYM_EXTENSION_INGEST_SECRET</code> in your Next
			app <code>.env</code>. Scrapes still save locally without this.
		</p>
		<label for="origin">App origin</label>
		<input
			id="origin"
			type="url"
			autocomplete="off"
			placeholder="http://127.0.0.1:1333"
		/>
		<label for="secret">Ingest secret</label>
		<input
			id="secret"
			type="password"
			autocomplete="off"
			spellcheck="false"
			placeholder="Long random string from .env"
		/>
		<button id="save" type="button">Save</button>
		<p id="status"></p>
		<script src="options.js"></script>
	</body>
</html>
